repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-format
  
  - repo: local
    hooks:
      - id: prettier
        name: prettier (pre-commit)
        entry: npx prettier --ignore-unknown --write 
        languge: system
        types_or: [javascript, jsx, ts, tsx, css, scss, html, json, yaml, markdown]