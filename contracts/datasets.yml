datasets:
  dpird:
    stages:
      chunk_n_compress:
        input_root: "acacia_clean_data"
        input_pattern: "DPIRD/DPIRD_final_stations.nc"
        output_root: "vz_kerchunk"
        output_pattern: "DPIRD/dpird_wa_stations.nc"
        chunk_map: { station: 96, time: 52624 }
        complevel: 5
      to_zarr:
        input_root: "acacia_clean_data"
        input_pattern: "DPIRD/DPIRD_final_stations.nc"
        output_root: "zarr_objects"
        chunk_map: { station: 192, time: 26312 }
        shard_map: { station: 192, time: 52624 }
        fill_value: "nan"
        fill_value_dtype: "float64"

  ecmwf:
    stages:
      chunk_n_compress:
        input_root: "acacia_clean_data"
        output_root: "vz_kerchunk"
        years:
          - year: 2024
            input_pattern: "ECMWF/2024/**/*.nc"
            output_pattern: "ECMWF/2024/ecmwf_op.nc"
          - year: 2025
            input_pattern: "ECMWF/2025/**/*.nc"
            output_pattern: "ECMWF/2025/ecmwf_op.nc"
        chunk_map: { time: 4 }
        complevel: 5
      to_zarr:
        input_root: "acacia_clean_data"
        input_pattern: "ECMWF/**/*.nc"
        output_root: "zarr_objects"
        chunk_map: { time: 6, step: 113, latitude: 111, longitude: 151 }
        shard_map: { time: 120, step: 113, latitude: 111, longitude: 151 }
        fill_value: "nan"
        fill_value_dtype: "float32"
